version: "3.9"
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      - backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=nearhire-secret
      - DATABASE_URL=postgres://user:pass@postgres:5432/nearhire
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=your-openai-key
      - WHATSAPP_API_URL=https://api.whatsapp.com
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: nearhire
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    volumes:
      - redis-data:/data
volumes:
  postgres-data: {}
  redis-data: {}
